<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} - SpecScore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  <link rel="canonical" href="{{canonical}}">
  {{alternateLink}}
  <script>
    (function() {
      var saved = localStorage.getItem('specscore-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <a href="/" class="wordmark"><span class="wordmark-clef">𝄞</span> SpecScore.md</a>
    <div class="header-right">
      <a href="https://github.com/synchestra-io/specscore">GitHub</a>
      <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme">
        <span class="theme-icon-light">&#9789;</span>
        <span class="theme-icon-dark">&#9788;</span>
      </button>
    </div>
  </header>
  <div class="site-body">
    <aside class="sidebar">
      {{sidebar}}
    </aside>
    <main>
      {{eyebrow}}
      {{content}}
      {{viewMarkdown}}
    </main>
  </div>
  <footer>
    <div class="footer-inner">
      <span>Apache License 2.0</span>
      <a href="https://specscore.md">specscore.md</a>
      <a href="https://github.com/synchestra-io/specscore">GitHub</a>
    </div>
  </footer>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('specscore-theme', next);
    });
  </script>
  <script>
    (function() {
      var ICON_COPY = '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V5a2 2 0 0 1 2-2h10"></path></svg>';
      var ICON_CHECK = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12l5 5L20 7"></path></svg>';
      var ICON_ERROR = '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v6M12 16v.01"></path></svg>';

      function render(btn, icon, label) {
        btn.innerHTML = icon + '<span>' + label + '</span>';
      }

      document.querySelectorAll('main pre > code').forEach(function(code) {
        var pre = code.parentNode;
        if (pre.parentNode.classList.contains('code-block')) return;

        var wrap = document.createElement('div');
        wrap.className = 'code-block';
        pre.parentNode.insertBefore(wrap, pre);
        wrap.appendChild(pre);

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'copy-btn';
        btn.setAttribute('aria-label', 'Copy code to clipboard');
        render(btn, ICON_COPY, 'Copy');
        wrap.appendChild(btn);

        btn.addEventListener('click', function() {
          var text = code.innerText;
          var done = function(ok) {
            btn.dataset.state = ok ? 'copied' : 'error';
            render(btn, ok ? ICON_CHECK : ICON_ERROR, ok ? 'Copied' : 'Failed');
            setTimeout(function() {
              delete btn.dataset.state;
              render(btn, ICON_COPY, 'Copy');
            }, 1500);
          };

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() { done(true); }, function() { done(false); });
            return;
          }

          var ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { done(document.execCommand('copy')); } catch (e) { done(false); }
          document.body.removeChild(ta);
        });
      });
    })();
  </script>
</body>
</html>
