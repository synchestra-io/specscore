<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} - SpecScore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
  <script>
    (function() {
      var saved = localStorage.getItem('specscore-theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <a href="/" class="wordmark"><span class="wordmark-clef">𝄞</span> SpecScore.org</a>
    <div class="header-right">
      <a href="https://github.com/synchestra-io/specscore">GitHub</a>
      <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme">
        <span class="theme-icon-light">&#9789;</span>
        <span class="theme-icon-dark">&#9788;</span>
      </button>
    </div>
  </header>
  <div class="site-body">
    <aside class="sidebar">
      {{sidebar}}
    </aside>
    <main>
      {{eyebrow}}
      {{content}}
      {{viewMarkdown}}
    </main>
  </div>
  <footer>
    <div class="footer-inner">
      <span>Apache License 2.0</span>
      <a href="https://specscore.org">specscore.org</a>
      <a href="https://github.com/synchestra-io/specscore">GitHub</a>
    </div>
  </footer>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('specscore-theme', next);
    });
  </script>
  <script>
    document.querySelectorAll('[data-collapsible]').forEach(function(section) {
      var btn = section.querySelector('.sidebar-expand');
      var hasActive = section.querySelector('.sidebar-nav li a.active');
      if (hasActive) {
        section.classList.add('is-expanded');
        btn.setAttribute('aria-expanded', 'true');
      }
      btn.addEventListener('click', function() {
        section.classList.toggle('is-expanded');
        var expanded = section.classList.contains('is-expanded');
        btn.setAttribute('aria-expanded', String(expanded));
      });
    });
  </script>
</body>
</html>
