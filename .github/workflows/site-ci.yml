name: Site Generator CI

on:
  push:
    paths:
      - '.github/workflows/site-ci.yml'
      - 'tools/site-generator/**'
      - 'spec/**'
  pull_request:
    paths:
      - '.github/workflows/site-ci.yml'
      - 'tools/site-generator/**'
      - 'spec/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tools/site-generator/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tools/site-generator
        run: pnpm install --frozen-lockfile

      - name: Install Chrome
        working-directory: tools/site-generator
        run: |
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1
          pnpm exec puppeteer browsers install chrome

      - name: Run tests
        working-directory: tools/site-generator
        run: pnpm test

      - name: Build site
        working-directory: tools/site-generator
        run: pnpm build

      - name: Verify no mermaid code blocks in HTML
        run: |
          if grep -r '```mermaid' public/*.html; then
            echo "ERROR: Found unrendered mermaid blocks in HTML output"
            exit 1
          fi

      - name: Verify mermaid SVGs rendered
        run: |
          for f in public/feature-specification.html public/plan-specification.html; do
            if ! grep -q '<svg' "$f"; then
              echo "ERROR: No SVG found in $f"
              exit 1
            fi
          done

      - name: Authenticate to GCP
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          NODE_NO_WARNINGS: 1
        run: pnpm --config.onlyBuiltDependencies='["protobufjs","re2"]' dlx firebase-tools@latest deploy --only hosting:specscore-org --non-interactive
